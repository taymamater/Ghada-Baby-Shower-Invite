<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smooth Winnie the Pooh Invitation</title>
  <style>
    /* --- NEW: Load your custom font --- */
    @font-face {
      font-family: 'Hugh Pillow';
      src: url('Hugh Pillow.ttf') format('truetype');
    }

    /* Reset and basic body styling */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-image: url('bg.jpg'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed; 
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh; 
      font-family: 'Georgia', serif;
      overflow-x: hidden; 
      perspective: 1200px; 
    }

    /* Wrapper to hold the envelope and button together */
    .page-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px; 
      transition: transform 0.5s ease-in-out;
    }

    .page-container.is-open {
      transform: translateY(120px);
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s;
    }

    /* The main envelope container */
    .envelope-wrapper {
      position: relative;
      width: 270px;
      height: 380px;
      cursor: pointer;
      transition: transform 0.3s ease; 
    }

    .envelope-wrapper:hover {
      transform: translateY(-5px);
    }

    /* The back inside of the envelope */
    .envelope-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #fceea7; 
      border-radius: 5px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }

    /* The invitation card container */
    .card {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 250px;
      height: 360px;
      background-color: transparent; 
      border: none; 
      border-radius: 0; 
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
      
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0s, 
                  box-shadow 0.5s ease 0s, 
                  z-index 0s 0.5s; 
    }

    /* The actual image inside the card */
    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain; 
      display: block;
    }

    /* The bottom/side pockets of the envelope */
    .envelope-front {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #fae482; 
      border-radius: 5px;
      z-index: 2;
      clip-path: polygon(0% 100%, 0% 0%, 50% 50%, 100% 0%, 100% 100%);
    }

    /* The top flap of the envelope */
    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background-color: #f5d44f; 
      border-radius: 5px 5px 0 0;
      z-index: 3;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top;
      transform-style: preserve-3d;
      transition: transform 0.5s ease-in-out 0.5s, z-index 0s 0.5s;
    }

    /* The image sticker seal */
    .sticker {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -40%);
      width: 60px; 
      height: 60px;
      background-color: #cce6f4; 
      border-radius: 50%;
      z-index: 4;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15); 
      transition: opacity 0.3s ease 0.8s, transform 0.3s ease;
    }

    .sticker img {
      width: 65%; 
      height: 65%;
      object-fit: contain;
    }

    .envelope-wrapper:hover .sticker {
      transform: translate(-50%, -40%) scale(1.05);
    }

    /* --- UPDATED: Directions Button Styling --- */
    .directions-btn {
      background-color: #cce6f4; 
      color: #555;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 30px; 
      font-family: 'Hugh Pillow', sans-serif; /* Applies your custom font */
      font-size: 20px; /* Custom fonts often need to be a bit larger */
      letter-spacing: 1px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      
      /* Flexbox perfectly aligns the icon and the text */
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px; 
      
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none; 
      transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .directions-btn:hover {
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      background-color: #baddf0;
    }

    /* Keeps the SVG icon sized perfectly next to the text */
    .directions-btn svg {
      width: 20px;
      height: 20px;
    }

    /* --- OPENED STATE ANIMATIONS --- */

    .is-open .envelope-flap {
      transform: rotateX(180deg);
      z-index: 0;
      transition: transform 0.5s ease-in-out 0s, z-index 0s 0.25s; 
    }

    .is-open .sticker {
      opacity: 0;
      transition: opacity 0.2s ease 0s;
    }

    .is-open .card {
      transform: translateY(-140px) scale(1.15);
      z-index: 5;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s, 
                  box-shadow 0.7s ease 0.5s, 
                  z-index 0s 0.5s; 
    }

    .is-open .directions-btn {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      transition: opacity 0.5s ease 0.8s, transform 0.5s ease 0.8s;
    }
  </style>
</head>
<body>

  <div class="page-container" id="page-container">
    
    <div class="envelope-wrapper" id="invite-envelope">
      <div class="envelope-back"></div>
      
      <div class="card">
        <img src="invite2.png" alt="Baby Shower Invitation">
      </div>

      <div class="envelope-front"></div>
      <div class="envelope-flap"></div>
      
      <div class="sticker">
        <img src="honey.png" alt="Honey Seal">
      </div>
    </div>

    <a href="https://www.google.com/maps/place/26%C2%B005'11.9%22N+49%C2%B059'49.1%22E/@26.0866389,49.9943973,17z/data=!3m1!4b1!4m4!3m3!8m2!3d26.0866389!4d49.9969722?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="directions-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
        <circle cx="12" cy="10" r="3"></circle>
      </svg>
      Location
    </a>

  </div>

  <script>
    const envelope = document.getElementById('invite-envelope');
    const pageContainer = document.getElementById('page-container');

    envelope.addEventListener('click', () => {
      pageContainer.classList.toggle('is-open');
    });
  </script>

</body>
</html>
